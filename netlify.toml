[build]
  command = "npm run build"
  publish = "dist"

# Serve the static landing.html to search engine crawlers at the root URL.
# Real users get the React app (index.html) as normal.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  conditions = {UserAgent = ["Googlebot", "Googlebot-Mobile", "Googlebot-Image", "Bingbot", "bingbot", "Slurp", "DuckDuckBot", "Baiduspider", "YandexBot", "Sogou", "Exabot", "facebookexternalhit", "Twitterbot", "LinkedInBot", "WhatsApp", "Slackbot", "TelegramBot", "Discordbot"]}

# All other routes go to the React app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

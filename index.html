<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Viewport & theme -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Primary SEO — uses both "RevisionFlow" and "Revision Flow" naturally -->
    <title>Revision Flow — Free AI GCSE & A-Level Revision Tracker | RevisionFlow</title>
    <meta name="description" content="Revision Flow is a free AI-powered revision tracker for GCSE and A-Level students. Track topics, log past papers, get AI study plans and predicted exam questions. Supports AQA, Edexcel, OCR, WJEC, Eduqas and CCEA. Used by UK students for smarter revision." />
    <meta name="keywords" content="revision flow, RevisionFlow, GCSE revision tracker, A-Level revision tracker, revision app, GCSE revision planner, AI revision, AQA revision, Edexcel revision, OCR revision, past paper tracker, free revision tool, UK exam revision, GCSE study planner, A Level revision app" />
    <meta name="author" content="RevisionFlow" />
    <link rel="canonical" href="https://revisionflow.netlify.app/" />

    <!-- Open Graph (WhatsApp, iMessage, Facebook previews) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://revisionflow.netlify.app/" />
    <meta property="og:title"       content="Revision Flow — Free AI GCSE & A-Level Revision Tracker" />
    <meta property="og:description" content="Free AI revision tracker for GCSE and A-Level students. Track topics, log past papers, get AI study plans. Supports all UK exam boards." />
    <meta property="og:image"       content="https://revisionflow.netlify.app/icons/icon-512.png" />
    <meta property="og:site_name"   content="RevisionFlow" />
    <meta property="og:locale"      content="en_GB" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Revision Flow — Free AI GCSE & A-Level Revision Tracker" />
    <meta name="twitter:description" content="Free AI revision tracker for GCSE and A-Level students. Track topics, past papers and exam dates." />
    <meta name="twitter:image"       content="https://revisionflow.netlify.app/icons/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Structured data — helps Google understand the product.
         Uses both "Revision Flow" and "RevisionFlow" so Google connects both spellings. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "RevisionFlow",
      "alternateName": ["Revision Flow", "Revision Flow App", "RevisionFlow App"],
      "url": "https://revisionflow.netlify.app",
      "description": "Revision Flow is a free AI-powered GCSE and A-Level revision tracker for UK students. Track topic confidence, log past papers, generate AI study plans, and get predicted exam questions. Supports AQA, Edexcel, OCR, WJEC, Eduqas and CCEA.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "GBP"
      },
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student",
        "typicalAgeRange": "14-18"
      },
      "inLanguage": "en-GB",
      "keywords": "revision flow, GCSE revision, A-Level revision, revision tracker, past paper tracker, AI revision, AQA, Edexcel, OCR, WJEC",
      "featureList": [
        "AI study plan generator",
        "Topic confidence tracker",
        "Past paper grade calculator with real grade boundaries",
        "AI answer marker with examiner feedback",
        "Emergency Mode for last-minute revision",
        "Predicted exam questions",
        "Revision timer with ambient sounds",
        "XP gamification and badges",
        "Exam date countdown tracker",
        "Support for AQA, Edexcel, OCR, WJEC, Eduqas, CCEA"
      ]
    }
    </script>
  </body>
</html>
